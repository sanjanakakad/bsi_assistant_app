<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#333"/>
    </marker>
    <style>
      .step { fill: #e8f0fe; stroke: #1f4e79; stroke-width: 2; rx: 10; }
      .step-data { fill: #e6f4ea; stroke: #137333; }
      .step-ui { fill: #fce8e6; stroke: #c5221f; }
      .step-out { fill: #f3e8fd; stroke: #9334e6; }
      .title { font-size: 18px; font-weight: bold; fill: #1f4e79; }
      .label { font-size: 13px; fill: #202124; font-weight: bold; }
      .small { font-size: 11px; fill: #5f6368; }
    </style>
  </defs>
  <text x="450" y="28" text-anchor="middle" class="title">Matrix Mode Flow - Phases 4-5 (Deterministic Backend)</text>

  <rect x="330" y="50" width="240" height="55" class="step step-ui"/>
  <text x="450" y="75" text-anchor="middle" class="label">1. Select Architecture</text>
  <text x="450" y="93" text-anchor="middle" class="small">component_compositions.yaml</text>

  <rect x="330" y="130" width="240" height="55" class="step step-data"/>
  <text x="450" y="155" text-anchor="middle" class="label">2. Resolve BSI Modules</text>
  <text x="450" y="173" text-anchor="middle" class="small">e.g. IND.2.2, IND.2.3</text>

  <rect x="330" y="210" width="240" height="55" class="step step-data"/>
  <text x="450" y="235" text-anchor="middle" class="label">3. Load and Merge Threats</text>
  <text x="450" y="253" text-anchor="middle" class="small">bsi_threat_store.json</text>

  <rect x="330" y="290" width="240" height="55" class="step step-data"/>
  <text x="450" y="315" text-anchor="middle" class="label">4. Apply VDI Impacts</text>
  <text x="450" y="333" text-anchor="middle" class="small">vdi2182_threat_mapping.yaml (C,I,A,S)</text>

  <rect x="330" y="370" width="240" height="55" class="step step-data"/>
  <text x="450" y="395" text-anchor="middle" class="label">5. Merge Expert Templates</text>
  <text x="450" y="413" text-anchor="middle" class="small">expert_threat_templates.json</text>

  <rect x="620" y="250" width="240" height="55" class="step step-ui"/>
  <text x="740" y="275" text-anchor="middle" class="label">6. Interactive Editor</text>
  <text x="740" y="293" text-anchor="middle" class="small">st.data_editor (pandas DataFrame)</text>

  <rect x="620" y="340" width="240" height="55" class="step step-out"/>
  <text x="740" y="365" text-anchor="middle" class="label">7. Export / Save</text>
  <text x="740" y="383" text-anchor="middle" class="small">CSV download + JSON persist</text>

  <rect x="40" y="250" width="240" height="80" class="step step-out"/>
  <text x="160" y="280" text-anchor="middle" class="label">Audit Labels</text>
  <text x="160" y="300" text-anchor="middle" class="small">Green: BSI (unchanged)</text>
  <text x="160" y="318" text-anchor="middle" class="small">Yellow: Modified | Blue: Expert</text>

  <line x1="450" y1="105" x2="450" y2="130" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="450" y1="185" x2="450" y2="210" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="450" y1="265" x2="450" y2="290" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="450" y1="345" x2="450" y2="370" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="570" y1="397" x2="620" y2="397" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="740" y1="305" x2="740" y2="340" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="330" y1="290" x2="280" y2="290" stroke="#333" marker-end="url(#arrow)"/>
</svg>
