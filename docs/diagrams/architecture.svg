<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#333"/>
    </marker>
    <style>
      .box { fill: #e8f0fe; stroke: #1f4e79; stroke-width: 2; rx: 8; }
      .box-ui { fill: #fce8e6; stroke: #c5221f; }
      .box-llm { fill: #fef7e0; stroke: #f9ab00; }
      .box-data { fill: #e6f4ea; stroke: #137333; }
      .box-out { fill: #f3e8fd; stroke: #9334e6; }
      .title { font-size: 18px; font-weight: bold; fill: #1f4e79; }
      .label { font-size: 13px; fill: #202124; }
      .small { font-size: 11px; fill: #5f6368; }
    </style>
  </defs>
  <text x="460" y="28" text-anchor="middle" class="title">BSI Assistant  High-Level Architecture</text>

  <rect x="30" y="170" width="120" height="60" class="box box-ui"/>
  <text x="90" y="198" text-anchor="middle" class="label">User</text>
  <text x="90" y="216" text-anchor="middle" class="small">Architect / Analyst</text>

  <rect x="200" y="150" width="150" height="100" class="box box-ui"/>
  <text x="275" y="188" text-anchor="middle" class="label">Streamlit UI</text>
  <text x="275" y="208" text-anchor="middle" class="small">Chat + Sidebar</text>
  <text x="275" y="226" text-anchor="middle" class="small">Data Editor + CSV</text>

  <polygon points="420,200 470,170 520,200 470,230" fill="#fff3cd" stroke="#856404" stroke-width="2"/>
  <text x="470" y="198" text-anchor="middle" class="label">Mode?</text>
  <text x="470" y="214" text-anchor="middle" class="small">Chat / Matrix</text>

  <rect x="560" y="60" width="170" height="90" class="box box-llm"/>
  <text x="645" y="92" text-anchor="middle" class="label">OpenAI Assistant</text>
  <text x="645" y="112" text-anchor="middle" class="small">Threads + Runs API</text>
  <text x="645" y="130" text-anchor="middle" class="small">File Search (RAG)</text>

  <rect x="760" y="60" width="130" height="90" class="box box-llm"/>
  <text x="825" y="98" text-anchor="middle" class="label">Vector Store</text>
  <text x="825" y="118" text-anchor="middle" class="small">BSI Compendium</text>
  <text x="825" y="136" text-anchor="middle" class="small">PDF (hosted)</text>

  <rect x="560" y="250" width="170" height="90" class="box"/>
  <text x="645" y="282" text-anchor="middle" class="label">Processing Layer</text>
  <text x="645" y="302" text-anchor="middle" class="small">RapidFuzz mapper</text>
  <text x="645" y="320" text-anchor="middle" class="small">Threat aggregator</text>

  <rect x="560" y="360" width="330" height="50" class="box box-data"/>
  <text x="725" y="390" text-anchor="middle" class="label">Data Layer (YAML / JSON)  synonyms, compositions, threats, VDI mappings, expert templates</text>

  <rect x="760" y="250" width="130" height="90" class="box box-out"/>
  <text x="825" y="288" text-anchor="middle" class="label">Outputs</text>
  <text x="825" y="308" text-anchor="middle" class="small">Chat + citations</text>
  <text x="825" y="326" text-anchor="middle" class="small">VDI 2182 matrix CSV</text>

  <line x1="150" y1="200" x2="200" y2="200" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="350" y1="200" x2="420" y2="200" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="520" y1="185" x2="560" y2="105" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="730" y1="105" x2="760" y2="105" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="520" y1="215" x2="560" y2="295" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="730" y1="295" x2="760" y2="295" stroke="#333" marker-end="url(#arrow)"/>
  <line x1="645" y1="340" x2="645" y2="360" stroke="#333" marker-end="url(#arrow)"/>
</svg>
