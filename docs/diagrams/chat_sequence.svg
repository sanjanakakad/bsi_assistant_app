<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 520" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#333"/>
    </marker>
    <style>
      .actor { fill: #e8f0fe; stroke: #1f4e79; stroke-width: 2; }
      .lifeline { stroke: #9aa0a6; stroke-width: 1.5; stroke-dasharray: 6 4; }
      .msg { stroke: #333; stroke-width: 1.5; marker-end: url(#arrow); }
      .msg-ret { stroke: #666; stroke-width: 1.5; stroke-dasharray: 5 3; marker-end: url(#arrow); }
      .title { font-size: 18px; font-weight: bold; fill: #1f4e79; }
      .label { font-size: 12px; fill: #202124; }
      .actor-label { font-size: 12px; font-weight: bold; fill: #1f4e79; }
    </style>
  </defs>
  <text x="490" y="28" text-anchor="middle" class="title">Sequence Diagram - Chat Mode (Phases 1-3)</text>

  <rect x="40" y="50" width="100" height="40" class="actor"/>
  <text x="90" y="75" text-anchor="middle" class="actor-label">User</text>
  <line x1="90" y1="90" x2="90" y2="480" class="lifeline"/>

  <rect x="200" y="50" width="120" height="40" class="actor"/>
  <text x="260" y="75" text-anchor="middle" class="actor-label">Streamlit</text>
  <line x1="260" y1="90" x2="260" y2="480" class="lifeline"/>

  <rect x="380" y="50" width="130" height="40" class="actor"/>
  <text x="445" y="75" text-anchor="middle" class="actor-label">Mapper</text>
  <text x="445" y="88" text-anchor="middle" class="label">(RapidFuzz)</text>
  <line x1="445" y1="90" x2="445" y2="480" class="lifeline"/>

  <rect x="570" y="50" width="140" height="40" class="actor"/>
  <text x="640" y="75" text-anchor="middle" class="actor-label">OpenAI API</text>
  <line x1="640" y1="90" x2="640" y2="480" class="lifeline"/>

  <rect x="770" y="50" width="150" height="40" class="actor"/>
  <text x="845" y="75" text-anchor="middle" class="actor-label">BSI Vector Store</text>
  <line x1="845" y1="90" x2="845" y2="480" class="lifeline"/>

  <line x1="90" y1="120" x2="260" y2="120" class="msg"/>
  <text x="175" y="112" text-anchor="middle" class="label">1. Enter question / components</text>

  <line x1="260" y1="150" x2="445" y2="150" class="msg"/>
  <text x="352" y="142" text-anchor="middle" class="label">2. split_components() + map_to_ind()</text>

  <line x1="445" y1="180" x2="260" y2="180" class="msg-ret"/>
  <text x="352" y="172" text-anchor="middle" class="label">3. matched IND modules + unmapped list</text>

  <line x1="260" y1="220" x2="640" y2="220" class="msg"/>
  <text x="450" y="212" text-anchor="middle" class="label">4. Create thread + run Assistant</text>

  <line x1="640" y1="260" x2="845" y2="260" class="msg"/>
  <text x="742" y="252" text-anchor="middle" class="label">5. File search on BSI PDF</text>

  <line x1="845" y1="300" x2="640" y2="300" class="msg-ret"/>
  <text x="742" y="292" text-anchor="middle" class="label">6. Retrieved passages + citations</text>

  <line x1="640" y1="340" x2="260" y2="340" class="msg-ret"/>
  <text x="450" y="332" text-anchor="middle" class="label">7. Threat titles + file citations</text>

  <line x1="260" y1="380" x2="90" y2="380" class="msg-ret"/>
  <text x="175" y="372" text-anchor="middle" class="label">8. Render answer in chat UI</text>

  <rect x="120" y="410" width="740" height="55" fill="#fef7e0" stroke="#f9ab00" rx="6"/>
  <text x="490" y="432" text-anchor="middle" class="label">Alt: no components detected - question sent directly to Assistant (steps 4-8)</text>
  <text x="490" y="452" text-anchor="middle" class="label">Polling loop: retrieve run status every 0.8s until completed or failed</text>
</svg>
