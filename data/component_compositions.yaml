# component_compositions.yaml
# Deterministic engineering model — uses ONLY real BSI IND modules
# (verified against pdfs/bsi_it_gs_comp_2022.pdf on 2026-06-04).
# Removed the non-existent IND.3.1 / IND.3.3; added IND.2.7 (Safety Instrumented Systems).

compositions:

  plc_basic:
    description: >
      A standalone programmable logic controller.
    components:
      - plc
    bsi_modules:
      - IND.2.2   # PLC (inherits IND.2.1 General ICS Components)
    notes:
      - No field devices or external connectivity assumed

  plc_with_field_devices:
    description: >
      PLC connected to sensors and actuators.
    components:
      - plc
      - sensor
      - actuator
    bsi_modules:
      - IND.2.2   # PLC
      - IND.2.3   # Sensors and Actuators
    notes:
      - Typical machine-level PLC

  plc_with_safety:
    description: >
      PLC with a dedicated Safety Instrumented System (SIS).
    components:
      - plc
      - safety_plc
      - sensor
      - actuator
    bsi_modules:
      - IND.2.2   # PLC
      - IND.2.3   # Sensors and Actuators
      - IND.2.7   # Safety Instrumented Systems
    notes:
      - Safety-related control paths present

  machine_cell:
    description: >
      A machine driven by a PLC with field devices.
    components:
      - plc
      - sensor
      - actuator
      - machine
    bsi_modules:
      - IND.2.2   # PLC
      - IND.2.3   # Sensors and Actuators
      - IND.2.4   # Machine
    notes:
      - Machine-level production cell

  plc_remote_maintained:
    description: >
      PLC reachable for remote maintenance / external access.
    components:
      - plc
      - remote_maintenance
    bsi_modules:
      - IND.2.2   # PLC
      - IND.3.2   # Remote Maintenance in Industry
    notes:
      - External connectivity via remote maintenance

  ics_cell_complete:
    description: >
      Complete industrial control cell: PLC, safety PLC, sensors,
      actuators, machine, and remote maintenance.
    components:
      - plc
      - safety_plc
      - sensor
      - actuator
      - machine
      - remote_maintenance
    bsi_modules:
      - IND.2.2   # PLC
      - IND.2.3   # Sensors and Actuators
      - IND.2.4   # Machine
      - IND.2.7   # Safety Instrumented Systems
      - IND.3.2   # Remote Maintenance in Industry
    notes:
      - Highest threat surface


# --------------------------------------------------
# MODULE INHERITANCE (Phase 4)
# Specific ICS components also carry the threats of the general
# ICS-component module (IND.2.1 General ICS Components).
# --------------------------------------------------
inheritance:
  IND.2.2: [IND.2.1]   # PLC
  IND.2.3: [IND.2.1]   # Sensors and Actuators
  IND.2.4: [IND.2.1]   # Machine
  IND.2.7: [IND.2.1]   # Safety Instrumented Systems
